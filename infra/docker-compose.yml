services:
  postgres:
    image: postgres:16
    container_name: genai-forge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-genai_forge}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-genai_forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - genai_net

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: genai-forge-qdrant
    ports:
      - "${QDRANT_HOST_PORT:-56333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':18BD' /proc/net/tcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - genai_net

  redis:
    image: redis:7-alpine
    container_name: genai-forge-redis
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - genai_net

  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: genai-forge-app
    env_file:
      - ../.env
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql+asyncpg://postgres:postgres@postgres:5432/genai_forge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "${BACKEND_HOST_PORT:-58000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - genai_net

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: genai-forge-celery
    command: ["celery", "-A", "app.worker:celery_app", "worker", "--loglevel=info"]
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - genai_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: genai-forge-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:48080/v1}
    ports:
      - "${FRONTEND_HOST_PORT:-43010}:3000"
    depends_on:
      app:
        condition: service_started
    networks:
      - genai_net

  nginx:
    image: nginx:1.27-alpine
    container_name: genai-forge-nginx
    ports:
      - "${NGINX_PORT:-48080}:80"
    depends_on:
      frontend:
        condition: service_started
      app:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - genai_net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: genai-forge-prometheus
    ports:
      - "${PROMETHEUS_PORT:-49090}:9090"
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - genai_net

  grafana:
    image: grafana/grafana:11.2.2
    container_name: genai-forge-grafana
    ports:
      - "${GRAFANA_PORT:-43011}:3000"
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - genai_net

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: genai-forge-jaeger
    ports:
      - "${JAEGER_PORT:-46686}:16686"
      - "${OTEL_GRPC_PORT:-44317}:4317"
      - "${OTEL_HTTP_PORT:-44318}:4318"
    networks:
      - genai_net

  langfuse-server:
    image: langfuse/langfuse:2
    container_name: genai-forge-langfuse
    profiles: ["observability"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-genai_forge}
      NEXTAUTH_SECRET: changeme
      SALT: changeme
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-43012}
      TELEMETRY_ENABLED: false
    ports:
      - "${LANGFUSE_PORT:-43012}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - genai_net

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  genai_net:
    driver: bridge
